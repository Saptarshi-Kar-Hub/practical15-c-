<html>
  <head>
    <title>Login Page</title>
    <link rel="stylesheet" href="practical15(c).css">
  </head>
  <body>
    <!-- Header section -->
    <div class="header">
      <h3>Saptarshi Kar</h3>
      <h2>Login Page</h2>
    </div>

    <!-- Content section -->
    <div class="content">
      <div class="regForm">
        <fieldset>
          <legend>Login Page</legend>
          <form>
            <p class="Name">
                <label for="name">Name:</label>
                <input required type="text" name="name" id="name" placeholder="Enter your name">
            </p>
            <p class="Password">
                <label for="password">Password:</label>
                <input required type="password" name="pass" id="pass" placeholder="Enter your password">
            </p>
            <p class="Submit">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </p>
            <p class="SignUp">
                <h3 class="signUp">Don't have an account? <a href="practical11.html">Sign up</a></h3>
            </p>
          </form>
        </fieldset>
      </div>
    </div>

    <!-- Footer section -->
    <div class="footer">&copy; Saptarshi</div>
  </body>
</html>
